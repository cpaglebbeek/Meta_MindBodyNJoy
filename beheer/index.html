<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBodyNJoy — Functioneel Beheer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 24px; }
        .container { max-width: 900px; margin: 0 auto; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
        h1 { color: #a78bfa; font-size: 1.5rem; letter-spacing: 1.5px; text-transform: uppercase; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-top: 4px; }
        .sync-dot { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: #34d399; }
        .dot { width: 8px; height: 8px; background: #34d399; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Groepen */
        .group-section { margin-bottom: 40px; }
        .group-header { display: flex; align-items: center; gap: 10px; color: #475569; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; padding-bottom: 10px; margin-bottom: 16px; border-bottom: 1px solid #1e293b; }
        .group-id { background: #1e293b; color: #64748b; border: 1px solid #334155; border-radius: 6px; padding: 2px 8px; font-size: 0.7rem; letter-spacing: 1px; font-weight: 700; }

        /* Auth */
        #auth-screen { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; max-width: 420px; margin: 80px auto; text-align: center; }
        #auth-screen h2 { color: #a78bfa; margin-bottom: 8px; }
        #auth-screen p { color: #64748b; font-size: 0.88rem; margin-bottom: 24px; }

        /* Card */
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 28px; margin-bottom: 28px; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
        .card-title { color: #a78bfa; font-size: 1.1rem; font-weight: 700; }
        .card-description { color: #64748b; font-size: 0.82rem; margin-bottom: 16px; }

        /* Omgeving badges */
        .env-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .env-badge { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; border: 1px solid; cursor: default; }
        .env-badge.prod { background: #1a2744; border-color: #3b82f6; color: #93c5fd; }
        .env-badge.stag { background: #1a2d1a; border-color: #22c55e; color: #86efac; }
        .env-badge .env-label { opacity: 0.7; font-weight: 400; }
        .env-badge .env-ver { font-weight: 700; }
        .env-live-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .env-badge.prod .env-live-dot { background: #3b82f6; }
        .env-badge.stag .env-live-dot { background: #22c55e; }

        /* Textarea */
        .editor-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        textarea { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-family: inherit; font-size: 0.95rem; line-height: 1.6; padding: 14px; resize: vertical; min-height: 110px; transition: border-color 0.2s; }
        textarea:focus { outline: none; border-color: #a78bfa; }
        textarea.changed { border-color: #fbbf24; }

        /* Note + save row */
        .note-row { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
        .note-row input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #94a3b8; font-size: 0.82rem; padding: 8px 12px; }
        .note-row input:focus { outline: none; border-color: #a78bfa; }
        .note-row input::placeholder { color: #475569; }

        /* Buttons */
        button { cursor: pointer; border: none; border-radius: 8px; font-family: inherit; font-weight: 600; transition: all 0.15s; }
        .btn-save { background: #4c1d95; color: #c4b5fd; border: 1px solid #7c3aed; padding: 9px 18px; font-size: 0.83rem; }
        .btn-save:hover { background: #5b21b6; }
        .btn-save:disabled { background: #1e293b; color: #475569; border-color: #334155; cursor: default; }
        .btn-prod { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; padding: 5px 12px; font-size: 0.75rem; }
        .btn-prod:hover { background: #1d4ed8; color: white; }
        .btn-stag { background: #14532d; color: #86efac; border: 1px solid #22c55e; padding: 5px 12px; font-size: 0.75rem; }
        .btn-stag:hover { background: #15803d; color: white; }
        .btn-auth { background: #7c3aed; color: white; padding: 12px 32px; font-size: 0.95rem; width: 100%; margin-top: 8px; }
        .btn-auth:hover { background: #6d28d9; }
        .btn-logout { background: transparent; color: #475569; border: 1px solid #334155; padding: 6px 14px; font-size: 0.78rem; }
        .btn-logout:hover { color: #f87171; border-color: #f87171; }

        /* Versiegeschiedenis */
        .versions-toggle { margin-top: 18px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #64748b; font-size: 0.82rem; user-select: none; }
        .versions-toggle:hover { color: #94a3b8; }
        .versions-toggle .arrow { transition: transform 0.2s; display: inline-block; }
        .versions-toggle.open .arrow { transform: rotate(90deg); }
        .versions-list { display: none; margin-top: 12px; border-top: 1px solid #1e293b; padding-top: 12px; }
        .versions-list.open { display: block; }

        .version-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; border: 1px solid #1e293b; transition: background 0.15s; cursor: pointer; }
        .version-item:hover { background: rgba(167,139,250,0.05); border-color: #334155; }
        .version-item.selected { border-color: #7c3aed; background: rgba(124,58,237,0.07); }
        .version-meta { flex: 1; min-width: 0; }
        .version-num { font-size: 0.72rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .version-preview { font-size: 0.84rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .version-preview.empty { font-style: italic; color: #475569; }
        .version-info { font-size: 0.72rem; color: #475569; margin-top: 3px; }
        .version-note { color: #fbbf24; }

        .version-env-tags { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .vtag { font-size: 0.68rem; font-weight: 700; padding: 1px 7px; border-radius: 10px; border: 1px solid; }
        .vtag-prod { background: #1a2744; border-color: #3b82f6; color: #93c5fd; }
        .vtag-stag { background: #14532d; border-color: #22c55e; color: #86efac; }

        .version-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }

        /* Input global */
        input[type="password"] { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-size: 0.95rem; padding: 12px 14px; margin-bottom: 8px; }
        input[type="password"]:focus { outline: none; border-color: #a78bfa; }

        /* Toast */
        #toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 0.88rem; font-weight: 600; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; }
        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.success { background: #064e3b; color: #34d399; border: 1px solid #34d399; }
        #toast.error { background: #450a0a; color: #f87171; border: 1px solid #f87171; }

        .divider { border: none; border-top: 1px solid #1e293b; margin: 16px 0; }

        /* CI/CD promote */
        .promote-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2); border-radius: 8px; padding: 7px 12px; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
        .promote-bar-msg { font-size: 0.78rem; color: #fbbf24; flex: 1; }
        .btn-promote { background: #78350f; color: #fcd34d; border: 1px solid #fbbf24; padding: 5px 14px; font-size: 0.78rem; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
        .btn-promote:hover { background: #92400e; }
        .btn-promote-all { background: #1a1a0a; color: #fcd34d; border: 1px solid #fbbf24; padding: 8px 18px; font-size: 0.83rem; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
        .btn-promote-all:hover { background: #78350f; }
        .deployed-date { font-size: 0.68rem; color: #475569; margin-top: 2px; }

        /* Active bar */
        .active-bar { background: rgba(59,130,246,0.07); border: 1px solid rgba(59,130,246,0.15); border-radius: 8px; padding: 7px 12px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 8px; }
        .active-bar-label { color: #3b82f6; font-weight: 700; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; padding-top: 1px; flex-shrink: 0; }
        .active-bar-value { color: #64748b; font-size: 0.82rem; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* Single-line input */
        .input-single { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-family: inherit; font-size: 0.95rem; padding: 12px 14px; transition: border-color 0.2s; }
        .input-single:focus { outline: none; border-color: #a78bfa; }
        .input-single.changed { border-color: #fbbf24; }
        .input-heading { font-size: 1.1rem; font-weight: 600; }
        textarea.ta-address { font-family: 'Courier New', monospace; font-size: 0.87rem; }

        /* Preview panel */
        .preview-panel { margin-top: 10px; background: #0a1628; border: 1px solid #1e293b; border-radius: 8px; padding: 12px 16px; }
        .preview-label { font-size: 0.65rem; color: #334155; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-weight: 700; }
        .preview-heading { font-size: 1.5rem; font-weight: 800; color: #f1f5f9; line-height: 1.2; }
        .preview-subheading { font-size: 0.97rem; color: #94a3b8; line-height: 1.5; }
        .preview-btn-demo { display: inline-block; background: #7c3aed; color: white; padding: 9px 20px; border-radius: 8px; font-weight: 600; font-size: 0.88rem; }
        .preview-text { color: #94a3b8; line-height: 1.7; font-size: 0.9rem; }
        .preview-address { color: #94a3b8; font-family: 'Courier New', monospace; font-size: 0.85rem; white-space: pre-line; }
        .preview-copyright { color: #475569; font-size: 0.78rem; }
        .preview-tagline { color: #a78bfa; font-style: italic; font-size: 0.97rem; }
        .preview-seo-inline-title { font-size: 0.88rem; color: #93c5fd; font-weight: 600; }
        .preview-seo-inline-title.over { color: #f87171; }
        .preview-seo-inline-desc { font-size: 0.82rem; color: #64748b; }
        .preview-seo-inline-desc.over { color: #f87171; }
        .preview-empty { color: #334155 !important; font-style: italic; }

        /* Char counter */
        .char-row { display: flex; justify-content: flex-end; margin-top: 5px; }
        .char-counter { font-size: 0.72rem; color: #475569; font-family: monospace; }
        .char-counter.warning { color: #fbbf24; }
        .char-counter.over { color: #f87171; }
        .char-limit-bar { height: 2px; border-radius: 2px; margin-top: 3px; background: #1e293b; overflow: hidden; }
        .char-limit-fill { height: 100%; border-radius: 2px; transition: width 0.1s, background 0.1s; }

        /* Group previews */
        .group-preview { background: #0a1628; border: 1px solid #1e293b; border-radius: 12px; padding: 18px 22px; margin-bottom: 20px; }

        /* G2 hero preview */
        .hero-preview { text-align: center; padding: 16px 10px; }
        .hero-preview-heading { font-size: 1.6rem; font-weight: 800; color: #f1f5f9; margin-bottom: 8px; line-height: 1.2; }
        .hero-preview-sub { font-size: 0.92rem; color: #94a3b8; margin-bottom: 14px; }
        .hero-preview-cta { display: inline-block; background: #7c3aed; color: white; padding: 9px 22px; border-radius: 8px; font-weight: 600; font-size: 0.88rem; }
        .hero-preview-cta.empty-cta { opacity: 0.3; }

        /* G8 SEO snippets */
        .seo-snippets { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
        .seo-snippet { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 11px 13px; }
        .seo-page-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 700; }
        .seo-snippet-title { font-size: 0.87rem; color: #93c5fd; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .seo-snippet-title.over { color: #f87171; }
        .seo-snippet-url { font-size: 0.7rem; color: #34d399; margin-bottom: 3px; }
        .seo-snippet-desc { font-size: 0.76rem; color: #64748b; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .seo-snippet-desc.over { color: #f87171; }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- AUTH -->
<div id="auth-screen">
    <h2>Beheer toegang</h2>
    <p>Voer het beheer wachtwoord in om door te gaan.</p>
    <input type="password" id="token-input" placeholder="Wachtwoord" autocomplete="current-password">
    <div id="auth-error" style="display:none;color:#f87171;font-size:0.82rem;margin-bottom:8px;"></div>
    <button class="btn-auth" onclick="login()">Inloggen</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
    <div class="container">
        <header>
            <div>
                <h1>MindBodyNJoy Beheer</h1>
                <div class="subtitle"><span id="last-updated">Laden...</span> &nbsp;·&nbsp; <span id="beheer-ver" style="color:#475569"></span></div>
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                <button class="btn-promote-all" id="btn-promote-all" onclick="promoteAll()" style="display:none">⬆ Staging → Productie</button>
                <div class="sync-dot"><span class="dot"></span> CONTENT REPO</div>
                <button class="btn-logout" onclick="logout()">Uitloggen</button>
            </div>
        </header>
        <div id="cards-container"></div>
    </div>
</div>

<script>
const BEHEER_VERSION = 'v2.1.0';
const CONTENT_URL = './content.json';
const SAVE_URL    = './save.php';
const GROUPS = [
    { id: 'G1', label: 'Brand Identity',    fields: ['missie', 'visie', 'strategie'] },
    { id: 'G2', label: 'Homepage hero',     fields: ['hero_kopregel', 'hero_subtitel', 'hero_cta'] },
    { id: 'G3', label: 'Diensten / Aanbod', fields: ['diensten_oils', 'diensten_edelstenen', 'diensten_kaarsen'] },
    { id: 'G4', label: 'Over ons',          fields: ['over_intro', 'over_bio'] },
    { id: 'G5', label: 'Shop / Producten',  fields: ['shop_intro', 'shop_categorie'] },
    { id: 'G6', label: 'Contact',           fields: ['contact_intro', 'contact_adres', 'contact_openingstijden'] },
    { id: 'G7', label: 'Footer',            fields: ['footer_tagline', 'footer_copyright'] },
    { id: 'G8', label: 'SEO-teksten',       fields: ['seo_home_title', 'seo_home_description', 'seo_over_title', 'seo_over_description', 'seo_contact_title', 'seo_contact_description'] },
    { id: 'G9', label: 'Globale elementen', fields: ['cta_primair', 'cta_secondair', 'cookie_tekst'] },
];
const ENVS = { productie: { label: 'Productie', cls: 'prod', btnCls: 'btn-prod', tagCls: 'vtag-prod' },
               staging:   { label: 'Staging',   cls: 'stag', btnCls: 'btn-stag', tagCls: 'vtag-stag' } };

let token   = '';
let content = null;
let selected = {};  // { field: index } — welke versie geselecteerd in editor

// ── Helper functies ─────────────────────────────────────────────────────────
const SINGLE_LINE_TYPES = ['heading','subheading','button','seo-title','copyright','tagline'];
function isSingleLine(type) { return SINGLE_LINE_TYPES.includes(type); }
function escapeHtml(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function nl2br(s) { return escapeHtml(s).replace(/\n/g,'<br>'); }
function getActiveValue(field) { const f=content.content[field]; if(!f) return ''; return f.versions[f.active_index.productie]?.value??''; }

// ── Auth ────────────────────────────────────────────────────────────────────
async function login() {
    const val = document.getElementById('token-input').value.trim();
    if (!val) return;
    const btn = document.querySelector('.btn-auth');
    btn.disabled = true; btn.textContent = 'Controleren...';
    try {
        const r = await fetch(SAVE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + val },
            body: JSON.stringify({ action: 'ping' })
        });
        const json = await r.json();
        if (!r.ok || json.error) throw new Error('Onjuist wachtwoord');
        token = val;
        sessionStorage.setItem('mbnjoy_token', token);
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadContent();
    } catch(e) {
        document.getElementById('auth-error').textContent = 'Onjuist wachtwoord — probeer opnieuw.';
        document.getElementById('auth-error').style.display = 'block';
        btn.disabled = false; btn.textContent = 'Inloggen';
    }
}
function logout() { sessionStorage.removeItem('mbnjoy_token'); location.reload(); }
document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('token-input').addEventListener('input', () => { document.getElementById('auth-error').style.display = 'none'; });
window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('mbnjoy_token');
    if (saved) { token = saved; document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app').style.display = 'block'; loadContent(); }
});

// ── Content laden ────────────────────────────────────────────────────────────
async function loadContent() {
    try {
        const r = await fetch(CONTENT_URL + '?t=' + Date.now());
        content = await r.json();
        GROUPS.forEach(g => g.fields.forEach(f => {
            if (content.content[f]) selected[f] = content.content[f].active_index.productie ?? 0;
        }));
        renderAll();
    } catch(e) { toast('Kan content.json niet laden', 'error'); }
}

// ── Render alles ─────────────────────────────────────────────────────────────
function hasPromotableDiff() {
    if (!content) return false;
    return Object.values(content.content).some(f =>
        (f.active_index?.staging ?? 0) !== (f.active_index?.productie ?? 0)
    );
}

function updatePromoteAllBtn() {
    const btn = document.getElementById('btn-promote-all');
    if (btn) btn.style.display = hasPromotableDiff() ? '' : 'none';
}

function buildPromoteBarHtml(field) {
    const f = content.content[field];
    if ((f.active_index.staging ?? 0) === (f.active_index.productie ?? 0)) return '';
    const stagV = f.active_index.staging + 1;
    return `<div class="promote-bar" id="promote-bar-${field}">
        <span class="promote-bar-msg">⚡ Staging heeft versie ${stagV} — productie heeft versie ${f.active_index.productie + 1}</span>
        <button class="btn-promote" onclick="promoteField('${field}')">Staging → Productie ↑</button>
    </div>`;
}

function renderAll() {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';
    GROUPS.forEach(group => {
        const section = document.createElement('div');
        section.className = 'group-section';
        section.innerHTML = `<div class="group-header"><span class="group-id">${group.id}</span>${group.label}</div>`;

        // Groepspreview div voor G2 en G8 — vóór de cards
        if (group.id === 'G2') {
            const d = document.createElement('div');
            d.className = 'group-preview';
            d.id = 'group-preview-G2';
            section.appendChild(d);
        }
        if (group.id === 'G8') {
            const d = document.createElement('div');
            d.className = 'group-preview';
            d.id = 'group-preview-G8';
            section.appendChild(d);
        }

        group.fields.forEach(field => {
            if (content.content[field]) section.appendChild(buildCard(field));
        });
        container.appendChild(section);
    });

    document.getElementById('last-updated').textContent =
        'Laatste update: ' + new Date(content.last_updated).toLocaleString('nl-NL');
    document.getElementById('beheer-ver').textContent = 'Beheer ' + BEHEER_VERSION;

    // Groepspreviews renderen na alle cards
    renderG2Preview();
    renderG8Preview();
    updatePromoteAllBtn();
}

// ── Card bouwen ──────────────────────────────────────────────────────────────
function buildCard(field) {
    const f    = content.content[field];
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${field}`;

    const selIdx  = selected[field] ?? 0;
    const selVal  = f.versions[selIdx]?.value ?? '';
    const type    = f.type || 'text';

    // Active bar (alleen tonen als prod active value niet leeg is)
    const prodVal = f.versions[f.active_index.productie]?.value ?? '';
    const activeBarHtml = prodVal
        ? `<div class="active-bar" id="active-bar-${field}">
            <span class="active-bar-label">Live</span>
            <span class="active-bar-value">${escapeHtml(prodVal.replace(/\n/g,' ').substring(0,80)+(prodVal.length>80?'…':''))}</span>
           </div>`
        : `<div class="active-bar" id="active-bar-${field}" style="display:none">
            <span class="active-bar-label">Live</span>
            <span class="active-bar-value"></span>
           </div>`;

    // Editor: single-line of textarea
    let editorHtml;
    if (isSingleLine(type)) {
        const extraCls = type === 'heading' ? ' input-heading' : '';
        editorHtml = `<input type="text" id="ta-${field}" class="input-single${extraCls}" value="${escapeAttr(selVal)}" oninput="onTextChange('${field}')">`;
    } else {
        const extraCls = type === 'address' ? ' ta-address' : '';
        editorHtml = `<textarea id="ta-${field}" class="${extraCls}" oninput="onTextChange('${field}')">${escapeHtml(selVal)}</textarea>`;
    }

    // Char counter (alleen voor seo-title en seo-description)
    let charCounterHtml = '';
    if (type === 'seo-title' || type === 'seo-description') {
        const limit = type === 'seo-title' ? 60 : 160;
        const len = selVal.length;
        const pct = Math.min(100, len / limit * 100);
        const color = len > limit ? '#f87171' : len > limit * 0.9 ? '#fbbf24' : '#34d399';
        const cls = len > limit ? 'over' : len > limit * 0.9 ? 'warning' : '';
        charCounterHtml = `<div class="char-row"><span class="char-counter ${cls}" id="counter-${field}">${len} / ${limit}</span></div>
        <div class="char-limit-bar"><div class="char-limit-fill" id="charfill-${field}" style="width:${pct}%;background:${color}"></div></div>`;
    }

    // Preview panel
    const previewContent = getPreviewHtml(type, selVal);
    const previewHtml = (previewContent || ['heading','subheading','button'].includes(type))
        ? `<div class="preview-panel" id="preview-${field}"><div class="preview-label">Voorbeeld</div>${previewContent}</div>`
        : `<div class="preview-panel" id="preview-${field}" style="display:none"><div class="preview-label">Voorbeeld</div></div>`;

    card.innerHTML = `
        <div class="card-top">
            <div class="card-title">${escapeHtml(f.label)}</div>
            <div class="env-badges" id="badges-${field}">
                ${envBadgeHtml(f, 'productie')}
                ${envBadgeHtml(f, 'staging')}
            </div>
        </div>
        <div class="card-description">${escapeHtml(f.description)}</div>

        ${activeBarHtml}
        ${buildPromoteBarHtml(field)}

        <div class="editor-label" id="edlabel-${field}">Bewerken — Versie ${selIdx + 1} geselecteerd</div>
        ${editorHtml}
        ${charCounterHtml}
        ${previewHtml}

        <div class="note-row">
            <input type="text" id="note-${field}" placeholder="Notitie bij opslaan (optioneel)">
            <button class="btn-save" id="btnsave-${field}" onclick="saveField('${field}')" disabled>
                Opslaan als nieuwe versie
            </button>
        </div>

        <hr class="divider">
        <div class="versions-toggle" id="toggle-${field}" onclick="toggleVersions('${field}')">
            <span class="arrow">▶</span> Versiegeschiedenis (${f.versions.length} / 5)
        </div>
        <div class="versions-list" id="vlist-${field}">
            ${buildVersionList(field)}
        </div>
    `;
    return card;
}

// ── Preview HTML genereren ───────────────────────────────────────────────────
function getPreviewHtml(type, val) {
    switch(type) {
        case 'heading':
            return `<div class="preview-heading">${val ? escapeHtml(val) : '<span class="preview-empty">Kopregel verschijnt hier...</span>'}</div>`;
        case 'subheading':
            return `<div class="preview-subheading">${val ? escapeHtml(val) : '<span class="preview-empty">Subtitel verschijnt hier...</span>'}</div>`;
        case 'button':
            return `<span class="preview-btn-demo ${!val?'preview-empty':''}">${val ? escapeHtml(val) : 'Knoptekst...'}</span>`;
        case 'text':
            if (!val) return '';
            return `<div class="preview-text">${nl2br(val)}</div>`;
        case 'address':
            if (!val) return '';
            return `<div class="preview-address">${escapeHtml(val)}</div>`;
        case 'tagline':
            return `<div class="preview-tagline">${val ? escapeHtml(val) : '<span class="preview-empty">Tagline verschijnt hier...</span>'}</div>`;
        case 'copyright':
            return `<div class="preview-copyright">${val ? escapeHtml(val) : '<span class="preview-empty">Copyright tekst...</span>'}</div>`;
        case 'seo-title':
            if (!val) return '';
            return `<div class="preview-seo-inline-title ${val.length>60?'over':''}">${escapeHtml(val)}</div>`;
        case 'seo-description':
            if (!val) return '';
            return `<div class="preview-seo-inline-desc ${val.length>160?'over':''}">${escapeHtml(val)}</div>`;
        default:
            if (!val) return '';
            return `<div class="preview-text">${nl2br(val)}</div>`;
    }
}

// ── Env badge HTML ───────────────────────────────────────────────────────────
function envBadgeHtml(f, env) {
    const cfg = ENVS[env];
    const idx = f.active_index[env];
    const ver = f.versions[idx];
    const preview = ver?.value
        ? (ver.value.length > 22 ? ver.value.substring(0,22)+'…' : ver.value)
        : '(leeg)';
    return `<div class="env-badge ${cfg.cls}">
        <span class="env-live-dot"></span>
        <span class="env-label">${cfg.label}:</span>
        <span class="env-ver">v${idx + 1}</span>
        <span style="color:#475569;font-size:0.72rem;font-weight:400"> · ${escapeHtml(preview)}</span>
    </div>`;
}

// ── Versie lijst bouwen ──────────────────────────────────────────────────────
function buildVersionList(field) {
    const f       = content.content[field];
    const prodIdx = f.active_index.productie;
    const stagIdx = f.active_index.staging;
    const selIdx  = selected[field] ?? 0;

    return f.versions.map((v, i) => {
        const isProd   = i === prodIdx;
        const isStag   = i === stagIdx;
        const isSel    = i === selIdx;
        const preview  = v.value ? (v.value.length > 60 ? v.value.substring(0,60)+'…' : v.value) : null;
        const date     = new Date(v.timestamp).toLocaleString('nl-NL');
        const noteHtml = v.note ? `<span class="version-note"> · ${escapeHtml(v.note)}</span>` : '';
        const tags     = [
            isProd ? `<span class="vtag vtag-prod">PROD</span>` : '',
            isStag ? `<span class="vtag vtag-stag">STAGING</span>` : ''
        ].join('');
        const depStag = v.deployed_to?.staging   ? `<div class="deployed-date">Staging: ${new Date(v.deployed_to.staging).toLocaleString('nl-NL')}</div>` : '';
        const depProd = v.deployed_to?.productie ? `<div class="deployed-date">Productie: ${new Date(v.deployed_to.productie).toLocaleString('nl-NL')}</div>` : '';

        return `<div class="version-item ${isSel ? 'selected' : ''}" id="vi-${field}-${i}" onclick="selectVersion('${field}', ${i})">
            <div class="version-meta">
                <div class="version-num">Versie ${i + 1}</div>
                <div class="version-preview ${!preview ? 'empty' : ''}">${preview ? escapeHtml(preview) : '(leeg)'}</div>
                <div class="version-info">${date}${noteHtml}</div>
                ${depStag}${depProd}
                ${tags ? `<div class="version-env-tags">${tags}</div>` : ''}
            </div>
            <div class="version-actions">
                ${!isProd ? `<button class="btn-prod" onclick="event.stopPropagation();activateVersion('${field}',${i},'productie')">Publiceer</button>` : `<span style="font-size:0.7rem;color:#3b82f6;padding:4px 0">✓ Productie</span>`}
                ${!isStag ? `<button class="btn-stag" onclick="event.stopPropagation();activateVersion('${field}',${i},'staging')">Test in Staging</button>` : `<span style="font-size:0.7rem;color:#22c55e;padding:4px 0">✓ Staging</span>`}
            </div>
        </div>`;
    }).join('');
}

// ── Interactie ──────────────────────────────────────────────────────────────
function selectVersion(field, index) {
    selected[field] = index;
    const f   = content.content[field];
    const val = f.versions[index]?.value ?? '';
    const el  = document.getElementById(`ta-${field}`);

    if (el.tagName === 'TEXTAREA') {
        el.value = val;
    } else {
        el.value = val;
    }
    el.classList.remove('changed');
    document.getElementById(`btnsave-${field}`).disabled = true;

    // Editor label bijwerken via id
    const lbl = document.getElementById('edlabel-'+field);
    if (lbl) lbl.textContent = `Bewerken — Versie ${index + 1} geselecteerd`;

    // Versie items herstijlen
    document.querySelectorAll(`#vlist-${field} .version-item`).forEach((item, i) => {
        item.classList.toggle('selected', i === index);
    });

    // Inline preview en char counter bijwerken
    updateInlinePreview(field, val);
    updateCharCounterEl(field, val);

    // Groepspreview
    const group = GROUPS.find(g => g.fields.includes(field));
    if (group?.id === 'G2') renderG2Preview();
    else if (group?.id === 'G8') renderG8Preview();
}

function onTextChange(field) {
    const el = document.getElementById('ta-' + field);
    const val = el.value;
    const selIdx = selected[field] ?? 0;
    const origVal = content.content[field].versions[selIdx]?.value ?? '';
    const changed = val !== origVal;
    el.classList.toggle('changed', changed);
    document.getElementById('btnsave-' + field).disabled = !changed;

    // Inline preview bijwerken
    updateInlinePreview(field, val);

    // Char counter bijwerken
    updateCharCounterEl(field, val);

    // Groepspreview
    const group = GROUPS.find(g => g.fields.includes(field));
    if (group?.id === 'G2') renderG2Preview();
    else if (group?.id === 'G8') renderG8Preview();
}

function updateInlinePreview(field, val) {
    const previewEl = document.getElementById('preview-' + field);
    if (!previewEl) return;
    const type = content.content[field].type || 'text';
    const html = getPreviewHtml(type, val);
    const alwaysShow = ['heading','subheading','button'].includes(type);
    if (html || alwaysShow) {
        previewEl.style.display = '';
        previewEl.innerHTML = '<div class="preview-label">Voorbeeld</div>' + html;
    } else {
        previewEl.style.display = 'none';
    }
}

function updateCharCounterEl(field, val) {
    const counter = document.getElementById('counter-' + field);
    const fill    = document.getElementById('charfill-' + field);
    if (!counter) return;
    const type  = content.content[field].type;
    const limit = type === 'seo-title' ? 60 : 160;
    const len   = val.length;
    counter.textContent = len + ' / ' + limit;
    counter.className = 'char-counter ' + (len > limit ? 'over' : len > limit * 0.9 ? 'warning' : '');
    if (fill) {
        const pct = Math.min(100, len / limit * 100);
        fill.style.width = pct + '%';
        fill.style.background = len > limit ? '#f87171' : len > limit * 0.9 ? '#fbbf24' : '#34d399';
    }
}

function toggleVersions(field) {
    document.getElementById(`toggle-${field}`).classList.toggle('open');
    document.getElementById(`vlist-${field}`).classList.toggle('open');
}

// ── Groep G2 preview ─────────────────────────────────────────────────────────
function renderG2Preview() {
    const panel = document.getElementById('group-preview-G2');
    if (!panel) return;
    const k = document.getElementById('ta-hero_kopregel')?.value ?? getActiveValue('hero_kopregel');
    const s = document.getElementById('ta-hero_subtitel')?.value ?? getActiveValue('hero_subtitel');
    const c = document.getElementById('ta-hero_cta')?.value ?? getActiveValue('hero_cta');
    panel.innerHTML = `<div class="preview-label">Live voorbeeld — Homepage Hero</div>
    <div class="hero-preview">
      <div class="hero-preview-heading">${escapeHtml(k)||'<span class="preview-empty">Kopregel...</span>'}</div>
      <div class="hero-preview-sub">${escapeHtml(s)||'<span class="preview-empty">Subtitel...</span>'}</div>
      <span class="hero-preview-cta ${!c?'empty-cta':''}">${escapeHtml(c)||'CTA knop...'}</span>
    </div>`;
}

// ── Groep G8 preview ─────────────────────────────────────────────────────────
function renderG8Preview() {
    const panel = document.getElementById('group-preview-G8');
    if (!panel) return;
    const pages = [
        {label:'Homepage', url:'mindbodynjoy.nl/', tf:'seo_home_title', df:'seo_home_description'},
        {label:'Over ons', url:'mindbodynjoy.nl/over-ons/', tf:'seo_over_title', df:'seo_over_description'},
        {label:'Contact',  url:'mindbodynjoy.nl/contact/', tf:'seo_contact_title', df:'seo_contact_description'},
    ];
    const snippets = pages.map(p => {
        const t = document.getElementById('ta-'+p.tf)?.value ?? getActiveValue(p.tf);
        const d = document.getElementById('ta-'+p.df)?.value ?? getActiveValue(p.df);
        return `<div class="seo-snippet">
            <div class="seo-page-label">${p.label}</div>
            <div class="seo-snippet-title ${t.length>60?'over':''}">${escapeHtml(t)||p.label+' | MindBodyNJoy'}</div>
            <div class="seo-snippet-url">${p.url}</div>
            <div class="seo-snippet-desc ${d.length>160?'over':''}">${escapeHtml(d)||'Beschrijving nog niet ingevuld...'}</div>
        </div>`;
    }).join('');
    panel.innerHTML = `<div class="preview-label">Live voorbeeld — Zoekresultaten Google</div><div class="seo-snippets">${snippets}</div>`;
}

// ── Promote field (staging → productie) ─────────────────────────────────────
async function promoteField(field) {
    try {
        const r = await api({ action: 'promote', field });
        content = r.data;
        refreshCard(field);
        toast(`${content.content[field].label} gepromoveerd naar productie ✓`, 'success');
    } catch(e) { toast('Fout: ' + e.message, 'error'); }
}

// ── Promote all (alle velden staging → productie) ────────────────────────────
async function promoteAll() {
    const btn = document.getElementById('btn-promote-all');
    if (btn) { btn.disabled = true; btn.textContent = 'Bezig...'; }
    try {
        const r = await api({ action: 'promote_all' });
        content = r.data;
        Object.keys(content.content).forEach(field => {
            const card = document.getElementById('card-' + field);
            if (card) refreshCard(field);
        });
        toast('Alle velden gepromoveerd naar productie ✓', 'success');
    } catch(e) { toast('Fout: ' + e.message, 'error'); }
    if (btn) { btn.disabled = false; btn.textContent = '⬆ Staging → Productie'; }
}

// ── Opslaan ──────────────────────────────────────────────────────────────────
async function saveField(field) {
    const value = document.getElementById(`ta-${field}`).value;
    const note  = document.getElementById(`note-${field}`).value.trim();
    const btn   = document.getElementById(`btnsave-${field}`);
    btn.disabled = true; btn.textContent = 'Opslaan...';

    try {
        const r = await api({ action: 'save', field, value, note });
        content = r.data;
        selected[field] = 0;  // nieuwe versie staat bovenaan
        document.getElementById(`note-${field}`).value = '';
        refreshCard(field);
        toast(`${content.content[field].label} opgeslagen als nieuwe versie`, 'success');
    } catch(e) { toast('Fout: ' + e.message, 'error'); }
    btn.textContent = 'Opslaan als nieuwe versie';
}

// ── Versie activeren ─────────────────────────────────────────────────────────
async function activateVersion(field, index, env) {
    try {
        const r = await api({ action: 'activate', field, index, env });
        content = r.data;
        refreshCard(field);
        const envLabel = ENVS[env].label;
        toast(`Versie ${index + 1} van ${content.content[field].label} live in ${envLabel} ✓`, 'success');
    } catch(e) { toast('Fout: ' + e.message, 'error'); }
}

// ── Card refresh (zonder volledige re-render) ────────────────────────────────
function refreshCard(field) {
    const f    = content.content[field];
    const card = document.getElementById(`card-${field}`);

    // Badges
    document.getElementById(`badges-${field}`).innerHTML =
        envBadgeHtml(f, 'productie') + envBadgeHtml(f, 'staging');

    // Versie toggle teller
    const toggle = document.getElementById(`toggle-${field}`);
    toggle.innerHTML = `<span class="arrow ${toggle.classList.contains('open')?'open':''}">▶</span> Versiegeschiedenis (${f.versions.length} / 5)`;

    // Versie lijst
    document.getElementById(`vlist-${field}`).innerHTML = buildVersionList(field);

    // Last updated
    document.getElementById('last-updated').textContent =
        'Laatste update: ' + new Date(content.last_updated).toLocaleString('nl-NL');

    // Textarea / input
    const selIdx = selected[field] ?? 0;
    const selVal = f.versions[selIdx]?.value ?? '';
    const el = document.getElementById(`ta-${field}`);
    el.value = selVal;
    el.classList.remove('changed');
    document.getElementById(`btnsave-${field}`).disabled = true;

    // Editor label
    const lbl = document.getElementById('edlabel-' + field);
    if (lbl) lbl.textContent = `Bewerken — Versie ${selIdx + 1} geselecteerd`;

    // Inline preview en char counter
    updateInlinePreview(field, selVal);
    updateCharCounterEl(field, selVal);

    // Active bar bijwerken
    const prodVal = f.versions[f.active_index.productie]?.value ?? '';
    const barEl = document.getElementById('active-bar-' + field);
    if (barEl) {
        if (prodVal) {
            barEl.style.display = '';
            barEl.querySelector('.active-bar-value').textContent = prodVal.replace(/\n/g,' ').substring(0,80) + (prodVal.length > 80 ? '…' : '');
        } else {
            barEl.style.display = 'none';
        }
    }

    // Promote-bar bijwerken
    const existingBar = document.getElementById('promote-bar-' + field);
    const newBarHtml = buildPromoteBarHtml(field);
    if (existingBar) {
        if (newBarHtml) {
            existingBar.outerHTML = newBarHtml;
        } else {
            existingBar.remove();
        }
    } else if (newBarHtml) {
        // Invoegen na active-bar (of na card-description als active-bar er niet is)
        const anchor = document.getElementById('active-bar-' + field) ||
                       card.querySelector('.card-description');
        if (anchor) anchor.insertAdjacentHTML('afterend', newBarHtml);
    }
    updatePromoteAllBtn();

    // Groepspreview
    const group = GROUPS.find(g => g.fields.includes(field));
    if (group?.id === 'G2') renderG2Preview();
    else if (group?.id === 'G8') renderG8Preview();
}

// ── API helper ───────────────────────────────────────────────────────────────
async function api(body) {
    const r = await fetch(SAVE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(body)
    });
    const json = await r.json();
    if (!r.ok || json.error) throw new Error(json.error ?? 'Onbekende fout');
    return json;
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3500);
}
</script>
</body>
</html>
